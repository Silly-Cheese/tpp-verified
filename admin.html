<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>TPP Admin Portal</title><link rel='stylesheet' href='styles.css'><link href='https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap' rel='stylesheet'></head><body><div class='admin-wrap'><div class='admin-top'><div><h1 style='font-family:Cinzel,serif'>The Prayer Project Admin</h1><p>Volunteer Verification Management Portal</p></div><button id='loginBtn'>Login with Google</button></div><div id='adminContent' style='display:none'><div class='admin-grid'><div class='panel'><h2>Create Verification Record</h2><form id='recordForm'><input id='volunteerName' placeholder='Volunteer Name' required><input id='age' placeholder='Age'><input id='email' placeholder='Volunteer Email'><input id='phone' placeholder='Phone'><input id='positionRole' placeholder='Position / Role'><textarea id='duties' placeholder='Description of Duties'></textarea><input id='startDate' placeholder='Start Date'><input id='endDate' placeholder='End Date'><input id='totalHours' placeholder='Total Verified Hours'><button type='submit'>Create Record</button></form></div><div class='panel'><h2>Existing Records</h2><div id='records' class='records'></div></div></div></div></div><script type='module' src='admin.js'></script></body></html>
